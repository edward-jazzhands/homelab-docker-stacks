services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kg_postgres
    environment:
      POSTGRES_USER: kg_user
      POSTGRES_PASSWORD: kg_pass
      POSTGRES_DB: knowledge_graph
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: